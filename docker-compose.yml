services:
  postgres:
    image: postgres:latest
    container_name: movie-night-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: movie_night
      POSTGRES_PASSWORD: movie_night_dev
      POSTGRES_DB: movie_night
    ports:
      - "5433:5432"
    volumes:
      - movie_night_pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U movie_night -d movie_night"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  movie_night_pg_data:
    name: movie_night_pg_data
